<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dorm Wire — Control</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06030d;--ink:#f4f6ff;--dim:#8b86b8;--cyan:#23f0ff;--magenta:#ff2fb9;--amber:#ffd23a;--green:#39ff14;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:"VT323",monospace;display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px 16px;}
  h1{font-family:"Press Start 2P",monospace;font-size:18px;color:var(--cyan);text-shadow:0 0 12px rgba(35,240,255,.6);margin:0;}
  .status{font-size:22px;color:var(--dim);text-align:center;}
  .status b{color:var(--amber);}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(140px,1fr));gap:12px;width:min(520px,100%);}
  button{font-family:"Press Start 2P",monospace;font-size:11px;padding:16px 10px;cursor:pointer;
    color:#06030d;background:var(--cyan);border:none;letter-spacing:1px;}
  button.alt{background:var(--magenta);color:#fff;}
  button.warn{background:var(--amber);}
  button.wide{grid-column:span 2;background:#1a1330;color:var(--ink);border:2px solid var(--cyan);}
  a.open{color:var(--green);font-size:20px;text-decoration:none;}
</style>
</head>
<body>
  <h1>DORM WIRE · CONTROL</h1>
  <div class="status" id="status">Loading…</div>
  <div class="grid">
    <button onclick="setBoard('auto')" class="wide">AUTO (BY SCHEDULE)</button>
    <button onclick="setBoard('all')">ALL SPORTS</button>
    <button onclick="setBoard('mlb')">MLB</button>
    <button onclick="setBoard('nfl')">NFL</button>
    <button onclick="setBoard('cfb')">COLLEGE FB</button>
    <button onclick="setBoard('weekday')" class="alt">WEEKDAY</button>
    <button onclick="setBoard('asleep')" class="warn">SLEEP SCREEN</button>
  </div>
  <a class="open" href="/board" target="_blank">OPEN CURRENT BOARD →</a>
  <script>
    async function refresh(){
      const d = await (await fetch("/api/board",{cache:"no-store"})).json();
      const mode = d.override ? ("FORCED: " + d.override.toUpperCase())
                              : ("AUTO: " + d.auto.toUpperCase());
      document.getElementById("status").innerHTML =
        "Showing <b>" + d.board.toUpperCase() + "</b> &middot; " + mode;
    }
    async function setBoard(b){
      await fetch("/api/board/override?board=" + encodeURIComponent(b), {cache:"no-store"});
      refresh();
    }
    refresh();
    setInterval(refresh, 15000);
  </script>
</body>
</html>
