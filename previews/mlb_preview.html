<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dorm Wire — Arcade Board (Preview)</title>
    <!--
      DOUBLE-CLICK PREVIEW.
      This is the same board as the Flask app, but it uses plain relative
      paths instead of Jinja tags so it opens straight from disk.
      With no server running, app.js can't reach /api, so it falls back
      to the bundled SAMPLE data and renders a full demo board.
      Internet is needed once, only to load the fonts and team logos.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/styles.css">
  </head>
  <body>
    <main class="screen">
      <header class="hud">
        <div class="brand">
          <div class="brand-mark">DW</div>
          <div class="brand-text">
            <h1>DORM WIRE</h1>
            <p>MLB ARCADE BOARD</p>
            <small>HURST 11</small>
          </div>
        </div>

        <div class="counters">
          <div><span>GAMES</span><strong id="total-count">0</strong></div>
          <div><span>LIVE</span><strong id="live-count">0</strong></div>
          <div><span>FINAL</span><strong id="final-count">0</strong></div>
        </div>

        <div class="clock-block">
          <time id="clock">--:--</time>
          <span id="last-updated">SYNCING…</span>
        </div>
      </header>

      <section class="board">
        <div class="board-meta">
          <span id="date-label">LOADING SLATE</span>
          <span id="status-note">BUILDING GAME FOCUS</span>
        </div>
        <div id="games-grid" class="games-grid">
          <article class="tile skeleton"><span>LOADING…</span></article>
        </div>
      </section>
    </main>

    <footer id="ticker" class="ticker" aria-label="Sports ticker">
      <div class="ticker-league">MLB</div>
      <div class="ticker-window">
        <div id="ticker-track" class="ticker-track"><span>Loading today's wire…</span></div>
      </div>
    </footer>

    <script src="../static/js/app.js"></script>
  </body>
</html>
