<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dorm Wire — Weekday (Preview)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@600;700;800;900&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f16;--card:#141b26;--card2:#0f1620;--ink:#e8eef6;--dim:#8b95a5;--dim2:#6b7686;
  --cyan:#5cc8ff;--amber:#f5c542;--line:#1d2734;
  --grn:#22ff88;--red:#ff5a5a;--tamber:#ffcf3a;
}
*{box-sizing:border-box;}
html,body{width:100%;height:100%;margin:0;overflow:hidden;}
body{background:var(--bg);color:var(--ink);font-family:'Barlow Condensed',sans-serif;}
.screen{display:flex;flex-direction:column;height:100vh;width:100vw;padding:1.6vh 1.6vw 0;gap:1vh;}

.hud{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:10px;padding:1.2vh 1.4vw;flex:0 0 auto;}
.brand{display:flex;align-items:center;gap:.9vw;}
.brand-mark{display:grid;place-items:center;width:clamp(40px,3.4vw,60px);aspect-ratio:1;border-radius:8px;background:#0b0f16;color:var(--cyan);font-family:'Inter';font-weight:900;font-size:clamp(14px,1.2vw,22px);border:2px solid var(--cyan);}
.brand h1{margin:0;font-family:'Inter';font-weight:900;font-size:clamp(16px,1.7vw,30px);letter-spacing:1px;}
.brand p{margin:.3vh 0 0;font-family:'Inter';font-weight:800;font-size:clamp(8px,.72vw,12px);letter-spacing:3px;color:var(--cyan);}
.hud-mid{font-family:'Inter';font-weight:800;font-size:clamp(11px,1vw,17px);letter-spacing:2px;color:var(--dim);}
.clock-block{display:flex;flex-direction:column;align-items:flex-end;}
.clock-block time{font-family:'Inter';font-weight:800;font-size:clamp(26px,2.6vw,48px);line-height:.9;}
.clock-block span{font-family:'Inter';font-weight:700;font-size:clamp(9px,.72vw,12px);color:var(--dim2);margin-top:.4vh;letter-spacing:1px;}

/* quote of the day */
.quote-bar{display:flex;align-items:center;gap:1vw;background:var(--card);border-radius:10px;border-left:4px solid var(--amber);padding:.8vh 1.2vw;flex:0 0 auto;}
.q-tag{font-family:'Inter';font-weight:900;font-size:clamp(7px,.62vw,11px);letter-spacing:1.2px;color:#0b0f16;background:var(--amber);padding:.35em .6em;border-radius:4px;flex:0 0 auto;white-space:nowrap;}
.q-text{font-weight:600;font-style:italic;font-size:clamp(15px,1.3vw,25px);color:var(--ink);flex:1;line-height:1.15;}
.q-by{font-family:'Inter';font-weight:800;font-size:clamp(11px,.92vw,16px);color:var(--cyan);white-space:nowrap;flex:0 0 auto;}
.q-cat{font-family:'Inter';font-weight:800;font-size:clamp(7px,.6vw,10px);letter-spacing:1px;color:var(--dim2);border:1px solid var(--line);padding:.3em .55em;border-radius:4px;flex:0 0 auto;white-space:nowrap;}

.body{flex:1;display:grid;grid-template-columns:1fr clamp(260px,26vw,400px);gap:1.2vw;min-height:0;}
.left{display:grid;grid-template-rows:auto 1fr;gap:1vh;min-height:0;}
.schedules{display:grid;grid-template-columns:1fr 1fr;gap:1vw;}
.card{background:var(--card);border-radius:10px;padding:1vh 1vw;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.ctitle{font-family:'Inter';font-weight:800;font-size:clamp(9px,.82vw,13px);letter-spacing:1.5px;color:var(--cyan);margin-bottom:.7vh;}
.srow{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:.7vw;padding:.5vh .3vw;border-bottom:1px solid var(--line);}
.srow:last-child{border-bottom:0;}
.st{font-weight:700;font-size:clamp(15px,1.35vw,26px);color:var(--dim);min-width:3.4em;}
.sc{font-weight:700;font-size:clamp(15px,1.35vw,26px);color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr{font-family:'Inter';font-weight:700;font-size:clamp(9px,.7vw,12px);color:var(--dim2);}
.srow.now{background:var(--amber);border-radius:6px;padding:.5vh .6vw;border-bottom:0;}
.srow.now .st,.srow.now .sc{color:#1a1206;}
.srow.now .sr{color:#4a3a10;}
.srow.now .sc::after{content:" · NOW";font-family:'Inter';font-weight:900;font-size:.6em;}

.wx{display:grid;grid-template-columns:auto 1fr;gap:1.2vw;align-items:center;}
.wx-main{display:flex;flex-direction:column;}
.wx-temp{font-weight:800;font-size:clamp(44px,5.4vw,100px);line-height:.85;}
.wx-cond{font-weight:700;font-size:clamp(15px,1.4vw,26px);color:var(--dim);text-transform:uppercase;}
.wx-hilo{font-family:'Inter';font-weight:700;font-size:clamp(10px,.8vw,14px);color:var(--dim2);margin-top:.4vh;}
.wx-hours{display:grid;grid-template-columns:repeat(5,1fr);gap:.8vw;align-self:stretch;align-content:center;}
.wx-hr{background:var(--card2);border-radius:8px;padding:1vh .5vw;text-align:center;}
.wx-hr .h{font-family:'Inter';font-weight:800;font-size:clamp(9px,.7vw,12px);color:var(--dim2);}
.wx-hr .t{font-weight:800;font-size:clamp(18px,1.7vw,32px);margin-top:.5vh;}
.wx-hr .c{font-family:'Inter';font-weight:700;font-size:clamp(8px,.6vw,11px);color:var(--cyan);margin-top:.3vh;text-transform:uppercase;}

.rail{background:#000;border:2px solid var(--grn);border-radius:8px;padding:1vh .9vw;display:flex;flex-direction:column;gap:.7vh;font-family:'VT323',monospace;position:relative;overflow:hidden;min-height:0;}
.rail::after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.4) 0 1px,transparent 1px 3px);opacity:.35;}
.rail>*{position:relative;z-index:1;}
.rhead{display:flex;align-items:center;justify-content:space-between;}
.rtitle{font-size:clamp(15px,1.4vw,24px);color:var(--grn);text-shadow:0 0 6px rgba(34,255,136,.5);letter-spacing:1px;}
.dots{display:flex;gap:4px;}
.dot{width:7px;height:7px;border:1px solid var(--grn);}
.dot.on{background:var(--grn);box-shadow:0 0 6px var(--grn);}
.rtot{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px dashed #14512b;padding-bottom:.5vh;}
.rtot .v{font-size:clamp(22px,2vw,38px);color:#d6ffe8;}
.rtot .d{font-size:clamp(15px,1.3vw,24px);}
.rlist{display:flex;flex-direction:column;gap:.1vh;overflow:hidden;}
.hrow{display:grid;grid-template-columns:auto 1fr auto auto;align-items:baseline;gap:.6vw;padding:.35vh 0;border-bottom:1px solid rgba(20,81,43,.5);}
.sym{font-size:clamp(16px,1.4vw,26px);color:var(--tamber);min-width:3.6em;}
.shr{font-size:clamp(12px,1vw,18px);color:#3aa869;}
.prc{font-size:clamp(15px,1.3vw,24px);color:#d6ffe8;text-align:right;}
.chg{font-size:clamp(15px,1.3vw,24px);text-align:right;min-width:3.4em;}
.up{color:var(--grn);} .dn{color:var(--red);}

.newsstrip{height:5.2vh;min-height:36px;display:flex;align-items:center;overflow:hidden;background:var(--card);border-radius:10px;padding:0 1vw;flex:0 0 auto;}
.newsstrip .lbl{font-family:'Inter';font-weight:900;font-size:clamp(9px,.72vw,12px);letter-spacing:1px;color:var(--cyan);margin-right:1vw;flex:0 0 auto;}
.ns-window{flex:1;overflow:hidden;}
.ns-track{display:inline-block;white-space:nowrap;animation:scroll 70s linear infinite;font-weight:700;font-size:clamp(14px,1.2vw,22px);color:var(--ink);}
.ns-track .ns-item{margin-right:2.6vw;}
.ns-track .cat{display:inline-block;font-family:'Inter';font-weight:900;font-size:.6em;letter-spacing:.5px;padding:.2em .55em;border-radius:4px;margin-right:.7vw;color:#0b0f16;vertical-align:middle;}
.cat.macro,.cat.fed{background:var(--amber);}
.cat.ai,.cat.tech{background:var(--cyan);}
.cat.markets{background:var(--grn);}
.cat.earnings{background:#ff7ad9;}
.cat.crypto{background:#ffb020;}
.cat.energy{background:#ff8a5c;}
.cat.deal{background:#a08bff;}

.ribbon{height:6.6vh;min-height:50px;display:flex;align-items:stretch;background:#000;border-top:2px solid var(--grn);overflow:hidden;position:relative;flex:0 0 auto;}
.ribbon::after{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.4) 0 1px,transparent 1px 3px);opacity:.35;}
.ribbon .rl{display:grid;place-items:center;width:min(11vw,160px);background:var(--grn);color:#000;font-family:'VT323';font-size:clamp(16px,1.6vw,30px);letter-spacing:1px;flex:0 0 auto;z-index:1;}
.rb-window{flex:1;overflow:hidden;display:flex;align-items:center;}
.rb-track{display:flex;white-space:nowrap;animation:scroll 80s linear infinite;font-family:'VT323';font-size:clamp(18px,1.7vw,32px);}
.rb-item{margin-right:2.4vw;color:#d6ffe8;}
.rb-item .s{color:var(--tamber);}

@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
</style>
</head>
<body>
<div class="screen">
  <header class="hud">
    <div class="brand">
      <div class="brand-mark">DW</div>
      <div><h1>DORM WIRE</h1><p>WEEKDAY DASHBOARD</p></div>
    </div>
    <div class="hud-mid" id="dateline">MONDAY · SEP 14</div>
    <div class="clock-block"><time id="clock">--:--</time><span id="wxnow">HURST 11 · 64°F</span></div>
  </header>

  <div class="quote-bar" id="quote"></div>

  <div class="body">
    <div class="left">
      <div class="schedules">
        <div class="card"><div class="ctitle">ALEX · TODAY</div><div id="sched-alex"></div></div>
        <div class="card"><div class="ctitle">JORDAN · TODAY</div><div id="sched-jordan"></div></div>
      </div>
      <div class="card wx-card">
        <div class="ctitle" style="color:var(--amber)">WEATHER · TODAY</div>
        <div class="wx">
          <div class="wx-main">
            <span class="wx-temp">64&deg;</span>
            <span class="wx-cond">Partly Cloudy</span>
            <span class="wx-hilo">HI 71&deg; · LO 55&deg; · WIND 8 MPH · RAIN 10%</span>
          </div>
          <div class="wx-hours" id="wxhours"></div>
        </div>
      </div>
    </div>
    <aside class="rail" id="rail"></aside>
  </div>

  <div class="newsstrip">
    <span class="lbl">MARKET WIRE</span>
    <div class="ns-window"><div class="ns-track" id="news"></div></div>
  </div>

  <div class="ribbon">
    <div class="rl">MARKETS</div>
    <div class="rb-window"><div class="rb-track" id="ribbon"></div></div>
  </div>
</div>

<script>
const alex=[["9:30a","FIN 301 Corp Finance","214",0],["11:00a","ECON 202 Macro","118",1],["1:30p","ACCT 210 Mgr Acct","305",0],["3:15p","Study / Gym","—",0]];
const jordan=[["8:00a","STAT 240 Bus Stats","101",0],["10:00a","FIN 320 Investments","214",0],["12:30p","MKTG 200 Marketing","220",1],["2:00p","FIN 301 Corp Finance","214",0]];
const hours=[["9A","58°","cloudy"],["12P","68°","sun"],["3P","71°","sun"],["6P","66°","clear"],["9P","60°","clear"]];

const portfolio={total:"$18,432", day:"+$214 (+1.18%)", up:true, rows:[
  ["AAPL","42 sh","228.51","+1.2%",1],["NVDA","15 sh","178.20","+2.4%",1],
  ["MSFT","8 sh","511.30","+0.6%",1],["SPY","20 sh","642.10","+0.4%",1],
  ["VTI","30 sh","298.44","+0.5%",1],["TSLA","6 sh","412.90","-1.8%",0]]};
const watchlist={rows:[
  ["PLTR","","62.10","+3.1%",1],["AMD","","178.44","+1.9%",1],["COIN","","289.30","-2.2%",0],
  ["BTC","","118,240","+3.1%",1],["NFLX","","720.11","+0.8%",1],["META","","640.22","+1.4%",1],["JPM","","301.15","-0.5%",0]]};
const NEWS=[
  ["MACRO","Fed holds rates steady, signals one more cut could come before year-end"],
  ["AI","Nvidia's new chip sells out as data-center demand keeps outrunning supply"],
  ["MARKETS","S&P 500 notches a record close as tech leads a broad rally"],
  ["EARNINGS","Apple beats on services growth and guides next quarter above estimates"],
  ["CRYPTO","Bitcoin pushes past $118K as ETF inflows hit a monthly high"],
  ["MACRO","Hot jobs report cools market bets on a September rate cut"],
  ["TECH","Microsoft expands its OpenAI deal as Azure AI revenue jumps"],
  ["ENERGY","Oil slips as OPEC+ weighs raising output into year-end"],
  ["DEAL","Chipmaker announces $40B takeover, the sector's largest this year"]];
const ribbon=[["S&P 500","6,421","+0.4%",1],["NASDAQ","21,880","+0.6%",1],["DOW","44,120","+0.2%",1],["AAPL","228.51","+1.2%",1],["NVDA","178.20","+2.4%",1],["TSLA","412.90","-1.8%",0],["BTC","118,240","+3.1%",1],["10Y","4.18%","+0.02",1],["OIL","72.40","-0.7%",0],["GOLD","2,588","+0.3%",1]];

// Curated, verified quote bank. cat: war | phil | greek | sport
const QUOTES=[
  {t:"The credit belongs to the man who is actually in the arena.",by:"Theodore Roosevelt",cat:"war"},
  {t:"A good plan violently executed now is better than a perfect plan next week.",by:"George S. Patton",cat:"war"},
  {t:"Never give in. Never, never, never.",by:"Winston Churchill",cat:"war"},
  {t:"I have not yet begun to fight.",by:"John Paul Jones",cat:"war"},
  {t:"Duty, honor, country.",by:"Douglas MacArthur",cat:"war"},
  {t:"We are not retreating. We are advancing in another direction.",by:"Douglas MacArthur",cat:"war"},
  {t:"The soldier above all others prays for peace, for he must suffer the deepest wounds of war.",by:"Douglas MacArthur",cat:"war"},
  {t:"In the midst of chaos, there is also opportunity.",by:"Sun Tzu",cat:"war"},
  {t:"You have power over your mind, not outside events. Realize this, and you will find strength.",by:"Marcus Aurelius",cat:"phil"},
  {t:"We suffer more often in imagination than in reality.",by:"Seneca",cat:"phil"},
  {t:"It is not what happens to you, but how you react to it that matters.",by:"Epictetus",cat:"phil"},
  {t:"Waste no more time arguing about what a good man should be. Be one.",by:"Marcus Aurelius",cat:"phil"},
  {t:"The impediment to action advances action. What stands in the way becomes the way.",by:"Marcus Aurelius",cat:"phil"},
  {t:"He who has a why to live can bear almost any how.",by:"Friedrich Nietzsche",cat:"phil"},
  {t:"The unexamined life is not worth living.",by:"Socrates",cat:"phil"},
  {t:"No man is free who is not master of himself.",by:"Epictetus",cat:"phil"},
  {t:"Luck is what happens when preparation meets opportunity.",by:"Seneca",cat:"phil"},
  {t:"Molon labe. Come and take them.",by:"King Leonidas",cat:"greek"},
  {t:"What you leave behind is not what is engraved in stone, but what is woven into the lives of others.",by:"Pericles",cat:"greek"},
  {t:"No man ever steps in the same river twice.",by:"Heraclitus",cat:"greek"},
  {t:"Character is destiny.",by:"Heraclitus",cat:"greek"},
  {t:"Let me do some great thing that shall be told among men hereafter.",by:"Hector, in Homer's Iliad",cat:"greek"},
  {t:"Bear up, my heart; you have endured worse than this.",by:"Odysseus, in Homer's Odyssey",cat:"greek"},
  {t:"In peace, sons bury their fathers. In war, fathers bury their sons.",by:"Herodotus",cat:"greek"},
  {t:"The secret to happiness is freedom, and the secret to freedom is courage.",by:"Thucydides",cat:"greek"},
  {t:"Give me a place to stand, and I will move the earth.",by:"Archimedes",cat:"greek"},
  {t:"You miss 100% of the shots you don't take.",by:"Wayne Gretzky",cat:"sport"},
  {t:"I've failed over and over again in my life, and that is why I succeed.",by:"Michael Jordan",cat:"sport"},
  {t:"It ain't over till it's over.",by:"Yogi Berra",cat:"sport"},
  {t:"Hard work beats talent when talent fails to work hard.",by:"Tim Notke",cat:"sport"},
  {t:"It's not whether you get knocked down; it's whether you get up.",by:"Vince Lombardi",cat:"sport"},
  {t:"Don't count the days; make the days count.",by:"Muhammad Ali",cat:"sport"},
  {t:"Today I will do what others won't, so tomorrow I can do what others can't.",by:"Jerry Rice",cat:"sport"},
  {t:"Never let the fear of striking out keep you from playing the game.",by:"Babe Ruth",cat:"sport"},
  {t:"The more difficult the victory, the greater the happiness in winning.",by:"Pele",cat:"sport"}
];
const CATNAME={war:"WAR HEROES",phil:"PHILOSOPHY",greek:"ANCIENT GREECE",sport:"ATHLETES"};

const $=id=>document.getElementById(id);
function sched(list){return list.map(r=>`<div class="srow ${r[3]?"now":""}"><span class="st">${r[0]}</span><span class="sc">${r[1]}</span><span class="sr">${r[2]}</span></div>`).join("");}
$("sched-alex").innerHTML=sched(alex);
$("sched-jordan").innerHTML=sched(jordan);
$("wxhours").innerHTML=hours.map(h=>`<div class="wx-hr"><div class="h">${h[0]}</div><div class="t">${h[1]}</div><div class="c">${h[2]}</div></div>`).join("");

// quote of the day: stable per calendar day, spread across the whole bank (no near-repeats)
function renderQuote(){
  const day=Math.floor(Date.now()/86400000);
  const idx=(day*7919)%QUOTES.length;
  const q=QUOTES[idx];
  $("quote").innerHTML=`<span class="q-tag">QUOTE OF THE DAY</span><span class="q-text">&ldquo;${q.t}&rdquo;</span><span class="q-by">- ${q.by}</span><span class="q-cat">${CATNAME[q.cat]||""}</span>`;
}
renderQuote();

const nsOne=NEWS.map(n=>`<span class="ns-item"><span class="cat ${n[0].toLowerCase()}">${n[0]}</span>${n[1]}</span>`).join("");
$("news").innerHTML=nsOne+nsOne;
const rbOne=ribbon.map(s=>`<span class="rb-item"><span class="s">${s[0]}</span> ${s[1]} <span class="${s[3]?"up":"dn"}">${s[3]?"▲":"▼"}${s[2]}</span></span>`).join("");
$("ribbon").innerHTML=rbOne+rbOne;

let view=0;
function renderRail(){
  const dots=`<span class="dot ${view===0?"on":""}"></span><span class="dot ${view===1?"on":""}"></span>`;
  if(view===0){
    const rows=portfolio.rows.map(r=>`<div class="hrow"><span class="sym">${r[0]}</span><span class="shr">${r[1]}</span><span class="prc">${r[2]}</span><span class="chg ${r[4]?"up":"dn"}">${r[3]}</span></div>`).join("");
    $("rail").innerHTML=`<div class="rhead"><span class="rtitle">MY PORTFOLIO</span><span class="dots">${dots}</span></div>`
      +`<div class="rtot"><span class="v">${portfolio.total}</span><span class="d ${portfolio.up?"up":"dn"}">${portfolio.day}</span></div>`
      +`<div class="rlist">${rows}</div>`;
  } else {
    const rows=watchlist.rows.map(r=>`<div class="hrow"><span class="sym">${r[0]}</span><span class="shr"></span><span class="prc">${r[2]}</span><span class="chg ${r[4]?"up":"dn"}">${r[3]}</span></div>`).join("");
    $("rail").innerHTML=`<div class="rhead"><span class="rtitle">WATCHLIST</span><span class="dots">${dots}</span></div><div class="rlist" style="margin-top:.4vh">${rows}</div>`;
  }
}
renderRail();
setInterval(()=>{view=(view+1)%2;renderRail();},5000);

function clock(){
  const d=new Date();let h=d.getHours();const m=d.getMinutes();const ap=h>=12?"PM":"AM";h=h%12||12;
  $("clock").textContent=`${h}:${m<10?"0"+m:m} ${ap}`;
  const days=["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  const mo=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  $("dateline").textContent=`${days[d.getDay()]} · ${mo[d.getMonth()]} ${d.getDate()}`;
}
clock();setInterval(clock,15000);
</script>
</body>
</html>
